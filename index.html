<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>fullscreen ca glitch – mobile fix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', 'VT323', monospace;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .controls {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background: rgba(15, 17, 25, 0.85);
            backdrop-filter: blur(2px);
            border-top: 1px solid #3a3f4e;
            border-bottom: 1px solid #1e212c;
            z-index: 100;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.5);
        }

        button {
            background: #1a1d2b;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            padding: 0.6rem 1.4rem;
            color: #cbd5e6;
            border-bottom: 2px solid #2e3b4e;
            border-right: 1px solid #2a2f3e;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 2px 2px 0 #030405;
            text-transform: uppercase;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0 #030405;
            border-bottom: 1px solid #2e3b4e;
        }

        .status-bar {
            position: fixed;
            top: 0.8rem;
            left: 0.8rem;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            background: rgba(11, 13, 20, 0.8);
            padding: 0.3rem 1rem;
            border-left: 3px solid #7e8c8f;
            color: #b3bbc8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }

        .info-text {
            position: fixed;
            bottom: 5rem;
            right: 0.8rem;
            font-size: 0.6rem;
            color: #6a6f82;
            text-align: right;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.2rem 0.6rem;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
            border-radius: 2px;
        }

        @media (max-width: 700px) {
            button {
                padding: 0.4rem 1rem;
                font-size: 0.7rem;
            }

            .status-bar {
                font-size: 0.6rem;
                top: 0.4rem;
                left: 0.4rem;
            }

            .info-text {
                font-size: 0.5rem;
                bottom: 4.2rem;
            }

            .controls {
                gap: 0.7rem;
                bottom: 0.8rem;
                padding: 0.5rem 1rem;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/p5.min.js"></script>
</head>

<body>
    <div class="controls">
        <button id="snapBtn">[ SNAP + GLITCH ]</button>
        <button id="liveBtn">[ LIVE FEED ]</button>
    </div>
    <div class="status-bar" id="modeDisplay">MODE: LIVE (FLIPPED)</div>
    <div class="info-text">
        > rule: east-west kill, north-south birth<br>
        > [s] save PNG | fullscreen grid (gapless)
    </div>

    <script>
        let grid = [];
        let nextGrid = [];
        let video;
        let snapshotImage = null;
        let currentMode = "live";

        const GRID_SIZE = 200;
        let cellW, cellH;

        let snapButton, liveButton, modeLabel;
        let videoReady = false;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            pixelDensity(1);
            noSmooth();

            // request camera with flip
            video = createCapture(VIDEO, { flipped: true });
            video.size(width, height);
            video.hide();

            // wait for video to be ready
            video.elt.addEventListener('loadeddata', () => {
                videoReady = true;
                console.log("video ready");
            });

            snapButton = select("#snapBtn");
            liveButton = select("#liveBtn");
            modeLabel = select("#modeDisplay");

            snapButton.mousePressed(snapAndGlitch);
            liveButton.mousePressed(returnToLive);

            noStroke();
            frameRate(12);
            background(0);

            updateCellDimensions();
        }

        function updateCellDimensions() {
            cellW = width / GRID_SIZE;
            cellH = height / GRID_SIZE;
        }

        // capture current video frame using video.get() – reliable on mobile
        function captureSnapshot() {
            if (!videoReady || !video) return null;
            let frame = video.get();        // p5.Image at native video resolution (already flipped)
            frame.filter(GRAY);
            return frame;
        }

        // build grid from the grayscale snapshot, mapping canvas cell centers to image coordinates
        function initGridFromImage(img) {
            if (!img) return false;
            let imgW = img.width;
            let imgH = img.height;

            for (let j = 0; j < GRID_SIZE; j++) {
                grid[j] = [];
                for (let i = 0; i < GRID_SIZE; i++) {
                    // center of the canvas cell
                    let canvasX = i * cellW + cellW / 2;
                    let canvasY = j * cellH + cellH / 2;
                    // map to image pixel coordinates
                    let sx = map(canvasX, 0, width, 0, imgW);
                    let sy = map(canvasY, 0, height, 0, imgH);
                    sx = constrain(Math.floor(sx), 0, imgW - 1);
                    sy = constrain(Math.floor(sy), 0, imgH - 1);
                    let col = img.get(sx, sy);
                    let lum = (col[0] + col[1] + col[2]) / 3;
                    grid[j][i] = lum > 127 ? 1 : 0;
                }
            }
            // copy to nextGrid
            for (let j = 0; j < GRID_SIZE; j++) {
                nextGrid[j] = [];
                for (let i = 0; i < GRID_SIZE; i++) {
                    nextGrid[j][i] = grid[j][i];
                }
            }
            return true;
        }

        function snapAndGlitch() {
            if (!videoReady) {
                console.log("camera not ready");
                return;
            }
            let snapped = captureSnapshot();
            if (!snapped) return;
            snapshotImage = snapped;
            let success = initGridFromImage(snapshotImage);
            if (success) {
                currentMode = "glitch";
                modeLabel.html("MODE: GLITCH (CA EVOLVING)");
            } else {
                console.log("failed to init grid");
            }
        }

        function returnToLive() {
            currentMode = "live";
            grid = [];
            nextGrid = [];
            modeLabel.html("MODE: LIVE (FLIPPED)");
        }

        function updateCellular() {
            for (let j = 1; j < GRID_SIZE - 1; j++) {
                for (let i = 1; i < GRID_SIZE - 1; i++) {
                    if (grid[j][i] === 1) {
                        if (grid[j][i - 1] === 1 && grid[j][i + 1] === 1) {
                            nextGrid[j][i] = 0;
                        } else {
                            nextGrid[j][i] = 1;
                        }
                    } else {
                        if (grid[j - 1][i] === 1 || grid[j + 1][i] === 1) {
                            nextGrid[j][i] = 1;
                        } else {
                            nextGrid[j][i] = 0;
                        }
                    }
                }
            }
            for (let j = 0; j < GRID_SIZE; j++) {
                for (let i = 0; i < GRID_SIZE; i++) {
                    grid[j][i] = nextGrid[j][i];
                }
            }
        }

        // gapless rendering (no black lines)
        function renderGlitch() {
            noStroke();
            for (let row = 0; row < GRID_SIZE; row++) {
                let rowColor = color(random(30, 255), random(30, 255), random(30, 255));
                for (let col = 0; col < GRID_SIZE; col++) {
                    let x = col * cellW;
                    let y = row * cellH;
                    let w = (col === GRID_SIZE - 1) ? width - x : cellW;
                    let h = (row === GRID_SIZE - 1) ? height - y : cellH;
                    w = Math.ceil(w);
                    h = Math.ceil(h);
                    if (grid[row][col] === 1) {
                        fill(rowColor);
                    } else {
                        fill(90, 61, 43);
                    }
                    rect(x, y, w, h);
                }
            }
        }

        function draw() {
            if (currentMode === "live") {
                background(0);
                if (videoReady) {
                    image(video, 0, 0, width, height);
                    filter(GRAY);
                } else {
                    fill(100);
                    text("waiting for camera...", 20, 40);
                }
                fill(180, 190, 200);
                noStroke();
                textSize(12);
                text("> CAM LIVE (fullscreen)", 10, 25);
            }
            else if (currentMode === "glitch") {
                if (grid.length && nextGrid.length) {
                    updateCellular();
                    renderGlitch();
                } else {
                    background(30);
                    fill(200);
                    textSize(16);
                    text("no snapshot. click [ SNAP + GLITCH ]", width / 2 - 150, height / 2);
                }
                fill(220, 220, 200);
                textSize(10);
                text("> glitch active", 10, 20);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            if (video && videoReady) {
                video.size(width, height);
            }
            updateCellDimensions();
            if (currentMode === "glitch" && snapshotImage) {
                initGridFromImage(snapshotImage);
            }
        }

        function keyPressed() {
            if (key === 's' || key === 'S') {
                let d = new Date();
                let timestamp = nf(d.getFullYear(), 4) + nf(d.getMonth() + 1, 2) + nf(d.getDate(), 2) + "_" + nf(d.getHours(), 2) + nf(d.getMinutes(), 2) + nf(d.getSeconds(), 2);
                saveCanvas(`fullscreen_ca_glitch_${timestamp}`, 'png');
            }
        }
    </script>
</body>

</html>
